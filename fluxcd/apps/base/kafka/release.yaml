apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka
  namespace: kafka
spec:
  releaseName: kafka
  chart:
    spec:
      chart: kafka
      sourceRef:
        kind: HelmRepository
        name: bitnami
  interval: 60m
  install:
    remediation:
      retries: 3
  # Default values:
  # https://github.com/bitnami/charts/blob/main/bitnami/kafka/values.yaml
  values:
