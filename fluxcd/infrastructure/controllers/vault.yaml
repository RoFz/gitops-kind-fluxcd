---
apiVersion: v1
kind: Namespace
metadata:
  name: vault
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
spec:
  secretName: vault-tls
  dnsNames:
    - vault.k8s.example.internal
  issuerRef:
    name: internal-ca
    kind: ClusterIssuer
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: hashicorp
  namespace: vault
spec:
  interval: 5m
  url: https://helm.releases.hashicorp.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 10m
  timeout: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: vault
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: vault
  values:
    global:
      enabled: true
      tlsDisable: false
    injector:
      enabled: true
    server:
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
          cert-manager.io/cluster-issuer: internal-ca
        hosts:
          - host: vault.k8s.example.internal
        tls:
          - hosts:
              - vault.k8s.example.internal
            secretName: vault-tls
      extraEnvironmentVars:
        VAULT_CACERT: /vault/userconfig/vault-tls/vault.ca
        VAULT_TLSCERT: /vault/userconfig/vault-tls/vault.crt
        VAULT_TLSKEY: /vault/userconfig/vault-tls/vault.key
      volumes:
        - name: userconfig-vault-tls
          secret:
            defaultMode: 420
            secretName: vault-tls
      volumeMounts:
        - mountPath: /vault/userconfig/vault-tls
          name: userconfig-vault-tls
          readOnly: true
      standalone:
        enabled: false
      affinity: ""
      ha:
        enabled: true
        replicas: 2
        raft:
          enabled: true
          setNodeId: true
          config: |
            cluster_name = "vault-integrated-storage"
            ui = true
            listener "tcp" {
              tls_disable = 0
              address = "[::]:8200"
              cluster_address = "[::]:8201"
              tls_cert_file = "/vault/userconfig/vault-tls/vault.crt"
              tls_key_file  = "/vault/userconfig/vault-tls/vault.key"
              tls_client_ca_file = "/vault/userconfig/vault-tls/vault.ca"
            }
            storage "raft" {
              path = "/vault/data"
            }
            disable_mlock = true
            service_registration "kubernetes" {}
      auditStorage:
        enabled: true
    csi:
      enabled: false
