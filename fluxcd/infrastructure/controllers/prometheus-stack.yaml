---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: monitoring
spec:
  interval: 5m
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prom-stack
  namespace: monitoring
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "67.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 10
  values:
    grafana:
      # Set a strong password - do not use default credentials in production
      adminPassword: "<your-admin-password>"
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
          cert-manager.io/cluster-issuer: internal-ca
        hosts:
          - grafana.k8s.example.internal
        tls:
          - secretName: grafana-server-tls
            hosts:
              - grafana.k8s.example.internal
      persistence:
        enabled: true
        type: pvc
    prometheus:
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
          cert-manager.io/cluster-issuer: internal-ca
        hosts:
          - prometheus.k8s.example.internal
        tls:
          - secretName: prometheus-server-tls
            hosts:
              - prometheus.k8s.example.internal
    prometheusOperator:
      logLevel: info
